name: Copilot CI Benchmark

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "bench/ttl-cache-multithread-bench/**"
      - ".github/workflows/copilot_ci_benchmark.yml"
      - "Makefile"
      - "src/**"
      - "include/**"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

env:
  BENCH_DIR: bench/ttl-cache-multithread-bench
  BENCH_DURATION: "60"
  # Floor in million ops/s. Local 1-thread run hits ~50M; CI must stay well above this.
  PERF_FLOOR_MOPS: "1.0"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang tcc python3

      - name: Print runner diagnostics
        run: |
          echo "=== Runner info ==="
          uname -a
          nproc
          echo "=== CPU ==="
          lscpu || true
          echo "=== Memory ==="
          free -h
          echo "=== Compiler versions ==="
          gcc --version | head -1
          clang --version | head -1
          tcc --version | head -1

      - name: Build libttak (release)
        run: |
          set -euo pipefail
          make clean
          make -j"$(nproc)" CC=gcc
          echo "=== Verifying optimized objects ==="
          file lib/libttak.a
          nm -C lib/libttak.a | head -20

      - name: Run compiler benchmark series
        working-directory: ${{ env.BENCH_DIR }}
        env:
          TTAK_BENCH_THREADS: "$(nproc)"
        run: |
          set -euo pipefail
          THREADS=$(nproc)
          echo "Running benchmark with TTAK_BENCH_THREADS=${THREADS}"
          python3 ./run_ci_benchmark_series.py --duration ${{ env.BENCH_DURATION }}

      - name: Validate data completeness
        working-directory: ${{ env.BENCH_DIR }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          duration = int("${{ env.BENCH_DURATION }}")
          for name in ("gcc", "clang", "tcc"):
              path = Path(f"ci_benchmark_raw_{name}.txt")
              if not path.exists():
                  raise SystemExit(f"{name}: raw file missing")
              lines = path.read_text().splitlines()
              points = [ln for ln in lines if re.match(r"^\s*\d+s\s+\|", ln)]
              if len(points) != duration:
                  raise SystemExit(f"{name}: expected {duration} points, got {len(points)}")
              if not any(ln.lstrip().startswith(f"{duration}s |") for ln in points):
                  raise SystemExit(f"{name}: missing {duration}s row")
          print("validated: 60 data points for gcc/clang/tcc")
          PY

      - name: Performance floor check
        working-directory: ${{ env.BENCH_DIR }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re, sys

          floor = float("${{ env.PERF_FLOOR_MOPS }}")
          pattern = re.compile(r"^\s*(\d+)s\s*\|\s*(\d+)")
          failures = []
          for name in ("gcc", "clang", "tcc"):
              path = Path(f"ci_benchmark_raw_{name}.txt")
              ops_values = []
              for line in path.read_text().splitlines():
                  m = pattern.match(line)
                  if m:
                      ops_values.append(int(m.group(2)))
              if not ops_values:
                  failures.append(f"{name}: no data")
                  continue
              avg_mops = sum(ops_values) / len(ops_values) / 1e6
              print(f"{name}: avg throughput = {avg_mops:.2f} M ops/s")
              if avg_mops < floor:
                  failures.append(f"{name}: {avg_mops:.2f} M ops/s < floor {floor} M ops/s")

          if failures:
              print("PERFORMANCE FLOOR BREACH:")
              for f in failures:
                  print(f"  - {f}")
              sys.exit(1)
          print("performance floor check passed")
          PY

      - name: Regenerate SVG + README CI section
        working-directory: ${{ env.BENCH_DIR }}
        env:
          TTAK_BENCH_THREADS: "$(nproc)"
        run: |
          set -euo pipefail
          python3 ./generate_ci_benchmark_svg.py
          python3 ./update_readme_ci_section.py --duration ${{ env.BENCH_DURATION }}

      - name: Inspect generated SVG sizes
        working-directory: ${{ env.BENCH_DIR }}
        run: |
          ls -lh *.svg

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: copilot-ci-benchmark
          path: |
            bench/ttl-cache-multithread-bench/ci_benchmark_raw_gcc.txt
            bench/ttl-cache-multithread-bench/ci_benchmark_raw_clang.txt
            bench/ttl-cache-multithread-bench/ci_benchmark_raw_tcc.txt
            bench/ttl-cache-multithread-bench/copilot_ci_benchmark.svg
            bench/ttl-cache-multithread-bench/throughput_comparison.svg
            bench/ttl-cache-multithread-bench/rss_comparison.svg
            bench/ttl-cache-multithread-bench/README.md
            bench/ttl-cache-multithread-bench/README.ko.md

      - name: Push updated benchmark visualization to main
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            bench/ttl-cache-multithread-bench/ci_benchmark_raw_gcc.txt \
            bench/ttl-cache-multithread-bench/ci_benchmark_raw_clang.txt \
            bench/ttl-cache-multithread-bench/ci_benchmark_raw_tcc.txt \
            bench/ttl-cache-multithread-bench/copilot_ci_benchmark.svg \
            bench/ttl-cache-multithread-bench/throughput_comparison.svg \
            bench/ttl-cache-multithread-bench/rss_comparison.svg \
            bench/ttl-cache-multithread-bench/README.md \
            bench/ttl-cache-multithread-bench/README.ko.md
          git rm --ignore-unmatch \
            bench/ttl-cache-multithread-bench/throughput_comparison.png \
            bench/ttl-cache-multithread-bench/rss_comparison.png
          if git diff --cached --quiet; then
            echo "No benchmark visualization changes to push."
            exit 0
          fi
          git commit -m "chore: update CI benchmark visualization"
          git push origin HEAD:main
