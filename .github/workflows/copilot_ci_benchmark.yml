name: Copilot CI Benchmark

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "bench/ttl-cache-multithread-bench/**"
      - ".github/workflows/copilot_ci_benchmark.yml"
      - "Makefile"
      - "src/**"
      - "include/**"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang tcc python3 python3-matplotlib

      - name: Build libttak
        run: make -j"$(nproc)"

      - name: Run 60s compiler benchmark series
        working-directory: bench/ttl-cache-multithread-bench
        run: |
          set -euo pipefail
          python3 ./run_ci_benchmark_series.py --duration 60 --threads 1

      - name: Regenerate SVG + README CI section
        working-directory: bench/ttl-cache-multithread-bench
        run: |
          python3 ./generate_ci_benchmark_svg.py
          python3 ./update_readme_ci_section.py --duration 60

      - name: Regenerate benchmark PNG graphs
        run: |
          python3 ./scripts/autogen_bench_graphs.py

      - name: Auto-commit benchmark PNG updates
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -euo pipefail
          PNG_PATHS=(
            bench/ttl-cache-multithread-bench/throughput_comparison.png
            bench/ttl-cache-multithread-bench/rss_comparison.png
          )
          if git diff --quiet -- "${PNG_PATHS[@]}"; then
            echo "No PNG changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${PNG_PATHS[@]}"
          git commit -m "chore(bench): refresh CI benchmark PNG graphs"
          git push

      - name: Validate 60-point trend data
        working-directory: bench/ttl-cache-multithread-bench
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          for name in ("gcc", "clang", "tcc"):
              lines = Path(f"ci_benchmark_raw_{name}.txt").read_text().splitlines()
              points = [ln for ln in lines if re.match(r"^\s*\d+s\s+\|", ln)]
              if len(points) != 60:
                  raise SystemExit(f"{name}: expected 60 points, got {len(points)}")
              if not any(ln.lstrip().startswith("60s |") for ln in points):
                  raise SystemExit(f"{name}: missing 60s row")
          print("validated: 60 data points for gcc/clang/tcc")
          PY

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: copilot-ci-benchmark
          path: |
            bench/ttl-cache-multithread-bench/ci_benchmark_raw_gcc.txt
            bench/ttl-cache-multithread-bench/ci_benchmark_raw_clang.txt
            bench/ttl-cache-multithread-bench/ci_benchmark_raw_tcc.txt
            bench/ttl-cache-multithread-bench/copilot_ci_benchmark.svg
            bench/ttl-cache-multithread-bench/throughput_comparison.png
            bench/ttl-cache-multithread-bench/rss_comparison.png
            bench/ttl-cache-multithread-bench/README.md
            bench/ttl-cache-multithread-bench/README.ko.md
